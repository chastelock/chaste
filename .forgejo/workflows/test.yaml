on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: codeberg-medium
    container:
      image: codeberg.org/chaste/rust:1.93.0-alpine3.23-nextest0.9.124-tarpaulin0.35.1
    strategy:
      matrix:
        feature_flags:
          - ''
          - '--no-default-features'
          - '--no-default-features -p chaste-cli --features npm'
          - '--no-default-features -p chaste-cli --features yarn-classic'
          - '--no-default-features -p chaste-yarn --features berry'
          - '--no-default-features -p chaste-yarn --features classic'
          - '--no-default-features -p chaste-yarn --features zpm'
    steps:
      - uses: actions/checkout@v6
      - name: Run lib/bin tests
        run: cargo nextest run --locked $feature_flags
        env:
          feature_flags: ${{ matrix.feature_flags }}
      - name: Run doc tests
        run: |
          if [ "$feature_flags" == "${feature_flags/-p chaste-cli}" ]; then
            cargo test --locked --doc $feature_flags
          fi
        env:
          feature_flags: ${{ matrix.feature_flags }}
      - name: Generate test coverage
        if: ${{ secrets.CODECOV_TOKEN }}
        run: cargo tarpaulin --engine llvm --out xml --locked $feature_flags
        env:
          feature_flags: ${{ matrix.feature_flags }}
      - name: Upload coverage
        if: ${{ secrets.CODECOV_TOKEN }}
        uses: https://github.com/codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
